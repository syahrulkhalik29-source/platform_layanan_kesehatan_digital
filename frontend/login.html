<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masuk - Portal Kesehatan Digital</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body
    class="bg-slate-50 font-sans min-h-screen flex items-center justify-center"
  >
    <div
      class="w-full max-w-md bg-white shadow-xl rounded-2xl p-8 border border-slate-100 mx-4"
    >
      <div class="flex justify-center mb-6">
        <div class="p-3 bg-teal-100 text-teal-600 rounded-2xl shadow-inner">
          <svg
            class="w-12 h-12"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"
            ></path>
          </svg>
        </div>
      </div>

      <h2 class="text-2xl font-extrabold text-center text-slate-800 mb-6">
        Masuk ke Portal Kesehatan
      </h2>

      <div
        id="error-box"
        class="hidden mb-4 p-3 bg-red-100 text-red-700 text-sm rounded-lg border border-red-200"
      ></div>

      <form id="loginForm" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1"
            >Alamat Email</label
          >
          <input
            type="email"
            id="email"
            required
            class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500 bg-slate-50/50"
            placeholder="nama@email.com"
          />
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1"
            >Kata Sandi</label
          >
          <input
            type="password"
            id="password"
            required
            class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500 bg-slate-50/50"
            placeholder="••••••••"
          />
        </div>

        <div class="flex items-center justify-between text-sm text-slate-600">
          <label class="flex items-center space-x-2 cursor-pointer">
            <input
              type="checkbox"
              class="rounded border-slate-300 text-teal-600 focus:ring-teal-500"
            />
            <span>Ingat saya</span>
          </label>
          <a href="#" class="text-teal-600 hover:underline">Lupa kata sandi?</a>
        </div>

        <button
          type="submit"
          class="w-full py-3 bg-gradient-to-r from-teal-600 to-cyan-700 text-white font-bold rounded-xl shadow-md hover:from-teal-700 hover:to-cyan-800 transition transform active:scale-95 duration-150"
        >
          Masuk
        </button>
      </form>

      <div class="mt-6 text-center text-sm text-slate-600">
        Belum punya akun?
        <a
          href="register.html"
          class="text-teal-600 font-semibold hover:underline"
          >Daftar di sini</a
        >
      </div>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault(); // Mencegah halaman reload otomatis

          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const errorBox = document.getElementById("error-box");

          errorBox.classList.add("hidden"); // Sembunyikan error lama

          try {
            // Menembak endpoint API internal Laravel yang berjalan di localhost
            const response = await fetch(
              "https://platformlayanankesehatandigital-production.up.railway.app/api/login",
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  Accept: "application/json",
                },
                body: JSON.stringify({ email, password }),
              },
            );

            const result = await response.json();

            if (response.ok) {
              // Jika login sukses, simpan token keamanan dari Laravel Sanctum ke browser
              localStorage.setItem("auth_token", result.token);
              localStorage.setItem("user_name", result.data.name);

              // Alihkan ke halaman dashboard statis
              window.location.href = "https://syahrulkhalik29-source.github.io/platform-layanan-kesehatan-frontend/dashboard.html";
            } else {
              // Jika gagal, tampilkan pesan error dari backend
              errorBox.innerText =
                result.message || "Email atau kata sandi salah.";
              errorBox.classList.remove("hidden");
            }
          } catch (error) {
            errorBox.innerText = "Gagal terhubung ke server backend API.";
            errorBox.classList.remove("hidden");
          }
        });
    </script>
  </body>
</html>
