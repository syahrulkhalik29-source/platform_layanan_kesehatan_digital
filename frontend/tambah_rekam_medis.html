<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tambah Rekam Medis - Portal Kesehatan Masyarakat</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body
    class="bg-gradient-to-b from-teal-50 via-slate-50 to-blue-50 font-sans min-h-screen"
  >
    <nav
      class="bg-gradient-to-r from-teal-600 to-cyan-700 shadow-md sticky top-0 z-50"
    >
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
          <div class="flex items-center space-x-8">
            <div
              class="bg-white p-2 rounded-lg shadow-sm font-bold text-teal-600 tracking-wider"
            >
              BINARY
            </div>
            <div class="hidden sm:flex space-x-6 text-sm font-medium">
              <a
                href="dashboard.html"
                class="text-teal-100 hover:text-white transition"
                >Dashboard</a
              >
              <a
                href="faskes_view.html"
                class="text-teal-100 hover:text-white transition"
                >Pencarian Faskes</a
              >
              <a
                href="jadwal_dokter_view.html"
                class="text-teal-100 hover:text-white transition"
                >Reservasi Jadwal</a
              >
              <a
                href="rekam_medis_view.html"
                class="text-white font-bold border-b-2 border-white pb-1"
                >Rekam Medis</a
              >
              <a
                href="resep_obat_view.html"
                class="text-teal-100 hover:text-white transition"
                >Resep Obat</a
              >
            </div>
          </div>
          <div class="flex items-center space-x-4">
            <span id="user-display-nav" class="text-white text-sm font-semibold"
              >Memuat...</span
            >
            <button
              id="logoutBtn"
              class="px-3 py-1.5 bg-teal-700 bg-opacity-50 text-teal-100 hover:text-white hover:bg-opacity-80 rounded-lg text-xs font-bold transition"
            >
              Keluar
            </button>
          </div>
        </div>
      </div>
    </nav>

    <main class="py-12">
      <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="mb-6">
          <a
            href="rekam_medis_view.html"
            class="text-sm font-semibold text-teal-600 hover:text-teal-700 flex items-center space-x-1"
          >
            <span>← Kembali ke Daftar</span>
          </a>
        </div>

        <div class="bg-white shadow-xl rounded-2xl p-8 border border-slate-100">
          <h2 class="text-2xl font-extrabold text-slate-800 mb-2">
            Input Rekam Medis Masyarakat
          </h2>
          <p class="text-sm text-slate-500 mb-6">
            Silakan isi data demografi dan keluhan klinis pasien untuk
            menentukan rujukan otomatis.
          </p>

          <div
            id="status-box"
            class="hidden mb-4 p-3 text-sm rounded-lg border"
          ></div>

          <form id="tambahMedisForm" class="space-y-6">
            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1"
                >Nama Lengkap Pasien</label
              >
              <input
                type="text"
                id="nama"
                required
                class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500 bg-slate-50/50"
                placeholder="Contoh: Ahmad Fauzi"
              />
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-4 gap-6">
              <div class="sm:col-span-1">
                <label class="block text-sm font-semibold text-slate-700 mb-1"
                  >Umur (Tahun)</label
                >
                <input
                  type="number"
                  id="umur"
                  required
                  min="0"
                  max="120"
                  class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500 bg-slate-50/50"
                  placeholder="E.g. 25"
                />
              </div>
              <div class="sm:col-span-3">
                <label class="block text-sm font-semibold text-slate-700 mb-1"
                  >Alamat Domisili Tempat Tinggal</label
                >
                <input
                  type="text"
                  id="alamat"
                  required
                  class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500 bg-slate-50/50"
                  placeholder="Contoh: Jl. Teuku Umar No. 12, Banda Aceh"
                />
              </div>
            </div>

            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1"
                >Keluhan Kesehatan / Gejala Kesehatan</label
              >
              <textarea
                id="keluhan"
                rows="4"
                required
                class="w-full px-4 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500 bg-slate-50/50"
                placeholder="Tuliskan gejala yang dirasakan (misal: demam tinggi, pusing mual, nyeri gusi, sesak napas, dll.)"
              ></textarea>
            </div>

            <button
              type="submit"
              class="w-full py-3 bg-gradient-to-r from-teal-600 to-cyan-700 text-white font-bold rounded-xl shadow-md hover:from-teal-700 hover:to-cyan-800 transition transform active:scale-95 duration-150"
            >
              Simpan Rekam Medis
            </button>
          </form>
        </div>
      </div>
    </main>

    <script>
      const token = localStorage.getItem("auth_token");
      const userName = localStorage.getItem("user_name");

      if (!token) {
        window.location.href = "login.html";
      }
      document.getElementById("user-display-nav").innerText = userName;

      // Aksi Submit Formulir
      document
        .getElementById("tambahMedisForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const nama = document.getElementById("nama").value;
          const umur = document.getElementById("umur").value;
          const alamat = document.getElementById("alamat").value;
          const keluhan = document.getElementById("keluhan").value;
          const statusBox = document.getElementById("status-box");

          statusBox.classList.add("hidden");

          try {
            // Mengirim request data masyarakat ke API Core Laravel
            // Kita gunakan objek 'alamat' mengisi struktur parameter database
            const response = await fetch(
              "https://platformlayanankesehatandigital-production.up.railway.app/api/rekam-medis/tambah",
              {
                method: "POST",
                headers: {
                  Authorization: `Bearer ${token}`,
                  "Content-Type": "application/json",
                  Accept: "application/json",
                },
                body: JSON.stringify({
                  nama: nama,
                  nim: `${umur} Tahun, ${alamat}`, // Menyimpan Umur & Alamat ke kolom nim_atau_id di database tanpa merusak struktur DB yang lama
                  keluhan: keluhan,
                }),
              },
            );

            const result = await response.json();

            if (response.ok) {
              statusBox.className =
                "mb-4 p-3 text-sm rounded-lg border bg-green-100 text-green-700 border-green-200";
              statusBox.innerText =
                "Data Rekam Medis Masyarakat berhasil disimpan!";
              statusBox.classList.remove("hidden");

              setTimeout(() => {
                window.location.href = "rekam_medis_view.html";
              }, 1500);
            } else {
              statusBox.className =
                "mb-4 p-3 text-sm rounded-lg border bg-red-100 text-red-700 border-red-200";
              statusBox.innerText = result.message || "Gagal menyimpan data.";
              statusBox.classList.remove("hidden");
            }
          } catch (error) {
            statusBox.className =
              "mb-4 p-3 text-sm rounded-lg border bg-red-100 text-red-700 border-red-200";
            statusBox.innerText = "Gagal terhubung ke server API Core.";
            statusBox.classList.remove("hidden");
          }
        });

      // Logout action
      document
        .getElementById("logoutBtn")
        .addEventListener("click", function () {
          localStorage.clear();
          window.location.href = "login.html";
        });
    </script>
  </body>
</html>
